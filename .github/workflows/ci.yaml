name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  endor-scan:
    runs-on: ubuntu-latest
    # Note: id-token permission is NOT required for API Key auth
    permissions:
      contents: read
      pull-requests: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # # Build step is required for accurate reachability analysis
      # - name: Build Project
      #   run: |
      #     # Replace with your specific build command (e.g., npm install, mvn install)
      #     npm install
      - name: Debug Secret Presence
        run: |
          if [ -z "${{ secrets.ENDOR_API_KEY }}" ]; then
            echo "SECRET IS EMPTY"
            exit 1
          else
            echo "SECRET IS DEFINED"
          fi

      - name: Endor Labs Scan
        uses: endorlabs/github-action@v1
        with:
          namespace: "crestdata.ssbu.vmry"
          # Disable OIDC and provide API credentials
          enable_github_action_token: false 
          api_key: ${{ secrets.ENDOR_API_KEY }}
          api_secret: ${{ secrets.ENDOR_API_SECRET }}
          
          # Standard scan options
          scan_dependencies: true
          enable_pr_comments: ${{ github.event_name == 'pull_request' }}
  
  sonarqube-analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true